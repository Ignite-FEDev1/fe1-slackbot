service: fe1-slackbot
frameworkVersion: '3'
useDotenv: true

provider:
  name: aws
  profile: default
  region: ap-northeast-2

  runtime: nodejs20.x
  stage: prod # 기본 stage를 "prod"로 설정
  environment:
    SLACK_SIGNING_SECRET: ${env:SLACK_SIGNING_SECRET}
    SLACK_BOT_TOKEN: ${env:SLACK_BOT_TOKEN}
    ATLASSIAN_TOKEN: ${env:ATLASSIAN_TOKEN}
    GROQ_API_KEY: ${env:GROQ_API_KEY}
    ANTHROPIC_API_KEY: ${env:ANTHROPIC_API_KEY}
    RESEND_API_KEY: ${env:RESEND_API_KEY}
    GITLAB_BASE_URL: ${env:GITLAB_BASE_URL}
    GITLAB_TOKEN: ${env:GITLAB_TOKEN}
    NEXT_PUBLIC_DB_URL: ${env:NEXT_PUBLIC_DB_URL}
    DB_SERVICE_ROLE_KEY: ${env:DB_SERVICE_ROLE_KEY}
    VERCEL_BYPASS_SECRET: ${env:VERCEL_BYPASS_SECRET}
    EXTENSION_API_KEY: ${env:EXTENSION_API_KEY}
    EXT_NOTIFY_SLACK_CHANNEL: ${env:EXT_NOTIFY_SLACK_CHANNEL}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - lambda:InvokeFunction
          Resource:
            - arn:aws:lambda:ap-northeast-2:*:function:fe1-slackbot-prod-slack

functions:
  slack:
    handler: app.handler
    # API Gateway 한도(29s)와 별개로 worker(직접 invoke) 는 더 오래 돌아야 함.
    # monthly-report: 두 LLM 호출 + 큰 입력 + 첫 호출 cache_create 합치면 ~150s
    timeout: 240
    memorySize: 1024
    # 비동기 invoke 실패 시 자동 재시도 끔 (타임아웃 시 같은 작업 재실행 방지)
    maximumRetryAttempts: 0
    events:
      - http:
          path: slack/events
          method: post
      - http:
          path: api/{proxy+}
          method: any
          cors: true

plugins:
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 3086

package:
  include:
    - app.js
  exclude:
    - node_modules/**
    - src/**
    - ./**
